name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Run logic tests
        run: node tests/verify_logic.js

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          VERIFY-LOGIC_RESULTS: ${{ steps.run-logic-tests.outputs.result }}
        with:
          runners: verify-logic
