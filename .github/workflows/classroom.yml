name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Verify Logic (JS)
        uses: education/autograding-command-grader@v1
        id: verify-logic
        with:
          test-name: verify-logic
          setup-command: npm install # if needed, though not here
          command: node tests/verify_logic.js
          timeout: 10

      - name: Filter Test (C++)
        uses: education/autograding-command-grader@v1
        id: filter-test
        with:
          test-name: filter-test
          setup-command: g++ tests/test_filter.cpp -o filter_test
          command: ./filter_test
          timeout: 10

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          VERIFY-LOGIC_RESULTS: ${{steps.verify-logic.outputs.result}}
          FILTER-TEST_RESULTS: ${{steps.filter-test.outputs.result}}
        with:
          runners: verify-logic,filter-test
